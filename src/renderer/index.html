<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>Electron Web Spider</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-zinc-100 text-zinc-800 font-sans">
    <div class="container mx-auto p-4 flex flex-col h-screen">
      <h1 class="text-2xl font-bold text-center text-zinc-700 mb-4">
        Electron Web Spider
      </h1>
      <div class="controls flex flex-col gap-2 mb-4">
        <div class="flex gap-2">
          <input
            type="text"
            id="urlInput"
            placeholder="Введите стартовый URL (например, https://www.electronjs.org)"
            class="flex-grow p-2 border border-zinc-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none"
          />
          <button
            id="startButton"
            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:bg-zinc-400 disabled:cursor-not-allowed"
          >
            Начать сканирование
          </button>
        </div>
        <div class="flex flex-wrap items-center gap-4 text-sm text-zinc-600">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input
              type="checkbox"
              id="useSitemapCheckbox"
              class="rounded border-zinc-300 text-blue-600 focus:ring-blue-500"
            />
            Сначала из sitemap + обход ссылок на страницах
          </label>
          <label class="flex items-center gap-2 select-none">
            Лимит страниц:
            <input
              type="number"
              id="maxPagesInput"
              min="0"
              placeholder="∞"
              class="w-20 p-1 border border-zinc-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none"
            />
            <span class="text-zinc-400">(0 или пусто — без лимита)</span>
          </label>
        </div>
      </div>
      <div
        id="results-container"
        class="flex-grow border border-zinc-300 rounded-md overflow-y-auto bg-white min-h-[200px]"
      >
        <div id="results"></div>
      </div>
      <div
        id="status-bar"
        class="mt-2 p-2 bg-zinc-200 rounded-md text-xs text-zinc-600 flex justify-between"
      >
        <span id="status-text" class="italic">Готов к работе...</span>
        <div class="flex gap-4">
          <span id="status-scanned" class="font-semibold"
            >Просканировано: 0</span
          >
          <span id="status-queue" class="font-semibold">В очереди: 0</span>
        </div>
      </div>
    </div>

    <!-- Подключаем скрипт рендерера -->
    <script src="./renderer.js"></script>
  </body>
</html>
