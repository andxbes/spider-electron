<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>Electron Web Spider</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-zinc-100 text-zinc-800 font-sans h-screen flex flex-col overflow-hidden">
    <header class="shrink-0 border-b border-zinc-300 bg-white px-4 py-3">
      <div class="flex items-center gap-3">
        <h1 class="text-lg font-bold text-zinc-700 shrink-0">Electron Web Spider</h1>
        <input
          type="text"
          id="urlInput"
          placeholder="Початковий URL (наприклад, http://localhost/)"
          class="flex-grow p-2 border border-zinc-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm"
        />
        <button
          id="startButton"
          class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:bg-zinc-400 disabled:cursor-not-allowed text-sm shrink-0"
        >
          Сканувати
        </button>
        <button
          id="exportButton"
          disabled
          class="px-4 py-2 bg-zinc-600 text-white rounded-md hover:bg-zinc-700 disabled:opacity-50 disabled:cursor-not-allowed text-sm shrink-0"
        >
          Експорт CSV
        </button>
        <a
          href="./settings.html"
          class="px-3 py-2 text-sm text-zinc-600 border border-zinc-300 rounded-md hover:bg-zinc-50 shrink-0"
          title="Налаштування"
        >
          ⚙
        </a>
      </div>
    </header>

    <main class="flex-grow flex flex-col min-h-0 p-2 gap-2">
      <div class="flex-grow min-h-0 border border-zinc-300 rounded-md bg-white overflow-hidden flex flex-col">
        <div class="overflow-auto flex-grow min-h-0">
          <table class="w-full text-xs border-collapse">
            <thead class="sticky top-0 bg-zinc-100 border-b border-zinc-300 z-10">
              <tr class="text-left text-zinc-600">
                <th class="sortable-th p-2 font-semibold w-8 cursor-pointer select-none hover:bg-zinc-200" data-sort="index" title="Сортувати">#</th>
                <th class="sortable-th p-2 font-semibold min-w-[200px] cursor-pointer select-none hover:bg-zinc-200" data-sort="url" title="Сортувати">Address</th>
                <th class="sortable-th p-2 font-semibold w-16 cursor-pointer select-none hover:bg-zinc-200" data-sort="status" title="Сортувати">Status</th>
                <th class="sortable-th p-2 font-semibold min-w-[140px] cursor-pointer select-none hover:bg-zinc-200" data-sort="title" title="Сортувати">Title</th>
                <th class="sortable-th p-2 font-semibold min-w-[160px] cursor-pointer select-none hover:bg-zinc-200" data-sort="metaDescription" title="Сортувати">Meta Description</th>
                <th class="sortable-th p-2 font-semibold w-14 cursor-pointer select-none hover:bg-zinc-200" data-sort="links" title="Сортувати">Links</th>
                <th class="sortable-th p-2 font-semibold w-14 cursor-pointer select-none hover:bg-zinc-200" data-sort="inlinks" title="Сортувати">In</th>
              </tr>
            </thead>
            <tbody id="resultsTable"></tbody>
          </table>
        </div>
      </div>

      <div
        id="detailPanel"
        class="shrink-0 h-64 border border-zinc-300 rounded-md bg-white flex flex-col overflow-hidden"
      >
        <div class="flex border-b border-zinc-300 bg-zinc-50 shrink-0">
          <button
            type="button"
            data-tab="details"
            class="detail-tab px-4 py-2 text-xs font-medium border-b-2 border-blue-600 text-blue-700 bg-white"
          >
            Деталі URL
          </button>
          <button
            type="button"
            data-tab="inlinks"
            class="detail-tab px-4 py-2 text-xs font-medium border-b-2 border-transparent text-zinc-600 hover:text-zinc-800"
          >
            Вхідні посилання
          </button>
          <button
            type="button"
            data-tab="outlinks"
            class="detail-tab px-4 py-2 text-xs font-medium border-b-2 border-transparent text-zinc-600 hover:text-zinc-800"
          >
            Вихідні посилання
          </button>
          <div class="flex-grow"></div>
          <span
            id="selectedUrlHint"
            class="px-3 py-2 text-xs text-zinc-400 truncate max-w-md italic"
          >
            Оберіть рядок у таблиці
          </span>
        </div>
        <div id="detailContent" class="overflow-auto flex-grow p-0 text-xs">
          <p class="p-4 text-zinc-400 italic">Оберіть URL у таблиці вище</p>
        </div>
      </div>
    </main>

    <footer
      id="status-bar"
      class="shrink-0 px-4 py-2 bg-zinc-200 border-t border-zinc-300 text-xs text-zinc-600 flex justify-between"
    >
      <span id="status-text" class="italic">Готово до роботи...</span>
      <div class="flex gap-4">
        <span id="status-scanned" class="font-semibold">Проскановано: 0</span>
        <span id="status-queue" class="font-semibold">У черзі: 0</span>
      </div>
    </footer>

    <script src="./settings-store.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
