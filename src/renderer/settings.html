<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>Налаштування — Electron Web Spider</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-zinc-100 text-zinc-800 font-sans">
    <div class="container mx-auto p-4 max-w-2xl">
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-zinc-700">Налаштування</h1>
        <a
          href="./index.html"
          class="text-sm text-blue-600 hover:text-blue-800 hover:underline"
        >
          ← До краулера
        </a>
      </div>

      <form id="settingsForm" class="bg-white border border-zinc-300 rounded-md p-6 space-y-6">
        <section>
          <h2 class="text-sm font-semibold text-zinc-500 uppercase tracking-wide mb-3">
            Обхід сайту
          </h2>
          <label class="flex items-start gap-3 cursor-pointer select-none">
            <input
              type="checkbox"
              id="useSitemap"
              class="mt-1 rounded border-zinc-300 text-blue-600 focus:ring-blue-500"
            />
            <span>
              <span class="font-medium">Спочатку з sitemap + обхід посилань на сторінках</span>
              <span class="block text-sm text-zinc-500 mt-1">
                Читає Sitemap з robots.txt (або типові шляхи), додає URL у чергу,
                потім аналізує посилання на кожній сторінці.
              </span>
            </span>
          </label>
        </section>

        <section>
          <label for="maxPages" class="block font-medium mb-1">Ліміт сторінок</label>
          <input
            type="number"
            id="maxPages"
            min="0"
            placeholder="0"
            class="w-32 p-2 border border-zinc-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none"
          />
          <p class="text-sm text-zinc-500 mt-1">0 — без ліміту. Сканування зупиниться після N сторінок.</p>
        </section>

        <div class="flex items-center gap-3 pt-2 border-t border-zinc-200">
          <button
            type="submit"
            class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700"
          >
            Зберегти
          </button>
          <span id="saveStatus" class="text-sm text-green-600 hidden">Збережено</span>
        </div>

        <p class="text-xs text-zinc-400 pt-2 border-t border-zinc-100">
          Файл налаштувань:
          <code id="settingsPathHint" class="block mt-1 text-zinc-500 break-all">…</code>
        </p>
      </form>
    </div>

    <script src="./settings-store.js"></script>
    <script src="./settings.js"></script>
  </body>
</html>
